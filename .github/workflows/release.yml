name: release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # Skip the workflow's own version-bump commit so we don't infinite-loop
    # (the default GITHUB_TOKEN already prevents that, but this is explicit).
    if: "${{ !startsWith(github.event.head_commit.message, 'chore: release') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Sanity build
        working-directory: cli
        run: cargo build --release --locked

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Bump patch version
        id: bump
        working-directory: cli
        run: |
          cargo set-version --bump patch
          new_version=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)
          echo "version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Publish to crates.io
        working-directory: cli
        run: cargo publish --token "${{ secrets.CRATES_IO_TOKEN }}" --allow-dirty

      - name: Commit & tag
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cli/Cargo.toml cli/Cargo.lock
          git commit -m "chore: release cargo-oneway v${VERSION}"
          git tag "v${VERSION}"
          git push
          git push --tags
